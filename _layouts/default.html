<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}Sacred Civilization Research Archive · Al-Vid Scriptorium</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="keywords" content="Sacred Civilization Research Archive, SCRA, Al-Vid Scriptorium, Saad Khizar Bosal, Mandi Bahauddin, Henry Corbin, Ibn Arabi, Mulla Sadra, Suhrawardi, Warasat al-Anbiya, Khorasan Codes, civilizational transmission, Islamic metaphysics">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — {% endif %}Sacred Civilization Research Archive">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Sacred Civilization Research Archive",
    "alternateName": ["Al-Vid Scriptorium", "SCRA"],
    "url": "{{ site.url }}",
    "description": "{{ site.description | strip_newlines }}",
    "founder": {
      "@type": "Person",
      "name": "Saad Khizar Bosal",
      "jobTitle": "Framework Architect",
      "address": { "@type": "PostalAddress", "addressLocality": "Mandi Bahauddin", "addressRegion": "Punjab", "addressCountry": "PK" }
    },
    "sameAs": ["https://sacredcivilization.gumroad.com"]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  {% include nav.html %}

  {{ content }}

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
